name: Deploy to Azure Container Apps

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.REGISTRY_LOGIN_SERVER }}/sjplanner:${{ github.sha }}

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container App
        run: |
          az containerapp update \
            --name sjplanner-sm2026 \
            --resource-group sjplanner-sm2026-rg \
            --image ${{ secrets.REGISTRY_LOGIN_SERVER }}/sjplanner:${{ github.sha }}
          az containerapp update \
            --name sjplanner-sm2026 \
            --resource-group sjplanner-sm2026-rg \
            --set-env-vars \
              "AZURE_OPENAI_ENDPOINT=https://sbmorales1-1752-resource.cognitiveservices.azure.com/" \
              "AZURE_OPENAI_API_VERSION=2024-12-01-preview" \
              "AZURE_OPENAI_DEPLOYMENT_MAIN=gpt-4o-2" \
              "AZURE_OPENAI_DEPLOYMENT_FAST=gpt-4.1-nano-2"
